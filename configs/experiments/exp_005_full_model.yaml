experiment:
  id: EXP-005
  name: full_model_micro_rag_mc_streaming
  seed: 42

dataset:
  name: GoG
  graph_path: data/gog/polygon_hybrid_graph.pt
  context_path: data/contexts/synthetic_contexts.jsonl
  streaming_mode: true
  timestamp_field: tx_timestamp

model:
  base_model: dlg_gnn
  use_streaming: true
  use_micro_rag: true
  use_monte_carlo: true
  mc_samples: 10
  dropout_rate: 0.2

risk_injection:
  enabled: true
  mode: privacy_preserving_vector
  fusion_method: uncertainty_weighted
  alpha_init: 0.7
  beta_init: 0.3

evaluation:
  metrics:
    - auc_roc
    - auc_pr
    - f1
    - precision
    - recall
    - ece
    - brier_score
    - nll
    - latency_ms
    - throughput_tps
    - memory_mb
    - communication_bytes
