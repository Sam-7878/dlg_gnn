experiment:
  id: EXP-001
  name: static_dlg_gnn
  seed: 42

dataset:
  name: GoG
  graph_path: data/gog/polygon_hybrid_graph.pt
  context_path: data/contexts/synthetic_contexts.jsonl
  streaming_mode: false
  timestamp_field: tx_timestamp

model:
  base_model: dlg_gnn
  use_streaming: false
  use_micro_rag: false
  use_monte_carlo: false
  mc_samples: 1
  dropout_rate: 0.0

risk_injection:
  enabled: false
  mode: raw_context
  fusion_method: fixed_weight
  alpha_init: 1.0
  beta_init: 0.0

evaluation:
  metrics:
    - auc_roc
    - auc_pr
    - f1
    - precision
    - recall
    - latency_ms
    - throughput_tps
    - memory_mb
    - communication_bytes
